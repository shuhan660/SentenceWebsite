<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="p-4">

<h2>管理後台</h2>

<a href="/login" class="btn btn-primary mb-3">登入</a>

<hr>

<h4>新增句子</h4>

<form method="POST" action="/add_sentence" class="mb-4">

    <input name="content" class="form-control mb-2" placeholder="句子">

    <select name="region" class="form-control mb-2">
        <option value="北">北</option>
        <option value="中">中</option>
        <option value="南">南</option>
    </select>

    <select name="gender" class="form-control mb-2">
        <option value="男">男</option>
        <option value="女">女</option>
    </select>

    <button class="btn btn-success">新增</button>

</form>

<hr>

<h4>句子列表</h4>

<table class="table table-bordered">

<tr>
    <th>ID</th>
    <th>分類</th>
    <th>內容</th>
    <th>狀態</th>
</tr>

{% for s in sentences %}

<tr>
    <td>{{ s.id }}</td>
    <td>{{ s.region }} / {{ s.gender }}</td>
    <td>{{ s.content }}</td>
    <td>
        {% if s.selected %}
            已選
        {% else %}
            可選
        {% endif %}
    </td>
</tr>

{% endfor %}

</table>

</body>
</html>
