{% extends "layout.html" %}

{% block title %}首頁{% endblock %}

{% block content %}

<h1 style="color:black;">歡迎大家加入中山資管的大家庭~~</h1>

<div class="card p-4 shadow">

    <h3 class="text-center mb-3">抽直屬系統</h3>

    <form action="/submit" method="POST">

        <input class="form-control mb-2" name="student_id" placeholder="學號" required>

        <input class="form-control mb-2" name="name" placeholder="姓名" required>

        <select class="form-control mb-2" name="gender">
            <option>男</option>
            <option>女</option>
        </select>

        <select class="form-control mb-3" name="region">
            <option value="北">北部</option>
            <option value="中">中部</option>
            <option value="南">南部</option>
        </select>

        <button class="btn btn-success w-100">開始選句子</button>

    </form>

    <hr>

    <h3>管理系統</h3>

    <a href="/login">
        <button style="padding:10px; background:#8c736f; color:white;">
            管理員登入
        </button>
    </a>

</div>

{% endblock %}
